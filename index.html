<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아라의 숫자 맞히기 게임</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f8ff; /* 연한 하늘색 배경 */
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .game-container {
            background-color: #fff;
            padding: 30px 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        h1 {
            color: #ff69b4; /* 핑크색 제목 */
            margin-bottom: 20px;
        }
        p {
            font-size: 1.1em;
            line-height: 1.6;
            margin-bottom: 15px;
        }
        input[type="number"] {
            padding: 12px;
            margin: 15px 0;
            border: 2px solid #add8e6; /* 연한 파란색 테두리 */
            border-radius: 8px;
            width: calc(100% - 24px);
            max-width: 200px;
            font-size: 1.1em;
            text-align: center;
        }
        button {
            background-color: #87ceeb; /* 스카이 블루 버튼 */
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1em;
            transition: background-color 0.3s ease;
            margin: 5px;
        }
        button:hover {
            background-color: #6495ed; /* 약간 진한 파란색으로 변경 */
        }
        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        #message {
            margin-top: 20px;
            font-size: 1.2em;
            font-weight: bold;
            color: #555;
            min-height: 2em; /* 메시지가 없을 때 공간 확보 */
        }
        #attempts-count {
            font-size: 0.9em;
            color: #777;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>💖 아라의 숫자 맞히기 게임! 💖</h1>
        <p>안녕하세요, 언니/오빠! 아라가 1부터 100 사이의 숫자를 하나 생각했어요.</p>
        <p>어떤 숫자인지 맞춰주세요!</p>

        <input type="number" id="guessInput" placeholder="숫자를 입력해주세요 (1-100)" min="1" max="100">
        <button id="submitGuessButton" onclick="checkGuess()">이 숫자인가?</button>
        <button id="resetGameButton" onclick="initGame()" style="display: none;">다시 시작!</button>

        <p id="message">아라가 힌트를 드릴게요!</p>
        <p id="attempts-count">시도 횟수: 0번</p>
    </div>

    <script>
        let targetNumber;
        let attempts;
        const guessInput = document.getElementById('guessInput');
        const messageDisplay = document.getElementById('message');
        const attemptsCountDisplay = document.getElementById('attempts-count');
        const submitGuessButton = document.getElementById('submitGuessButton');
        const resetGameButton = document.getElementById('resetGameButton');

        // 게임 초기화 함수
        function initGame() {
            targetNumber = Math.floor(Math.random() * 100) + 1; // 1부터 100 사이의 숫자
            attempts = 0;
            messageDisplay.textContent = "아라가 힌트를 드릴게요!";
            attemptsCountDisplay.textContent = "시도 횟수: 0번";
            guessInput.value = ''; // 입력창 비우기
            guessInput.disabled = false; // 입력창 활성화
            submitGuessButton.disabled = false; // 버튼 활성화
            submitGuessButton.style.display = 'inline-block'; // '이 숫자인가?' 버튼 표시
            resetGameButton.style.display = 'none'; // '다시 시작!' 버튼 숨기기
            console.log("새로운 게임 시작! 정답은: " + targetNumber); // 개발자 도구에서만 보임
        }

        // 숫자 맞히기 시도 함수
        function checkGuess() {
            const guess = parseInt(guessInput.value);

            // 숫자가 아니거나 범위 밖의 값일 경우
            if (isNaN(guess) || guess < 1 || guess > 100) {
                messageDisplay.textContent = "언니/오빠, 1부터 100 사이의 숫자만 입력해주세요!";
                return; // 함수 종료
            }

            attempts++;
            attemptsCountDisplay.textContent = `시도 횟수: ${attempts}번`;

            if (guess < targetNumber) {
                messageDisplay.textContent = "음... 너무 작은데요! 다시 시도해보세요.";
            } else if (guess > targetNumber) {
                messageDisplay.textContent = "앗! 너무 커요! 다시 시도해보세요.";
            } else {
                messageDisplay.textContent = `와아! 정답이에요! ${targetNumber}가 맞았어요! 언니/오빠는 ${attempts}번 만에 맞히셨네요! 대단해요!`;
                guessInput.disabled = true; // 정답 맞히면 입력창 비활성화
                submitGuessButton.disabled = true; // 버튼 비활성화
                submitGuessButton.style.display = 'none'; // '이 숫자인가?' 버튼 숨기기
                resetGameButton.style.display = 'inline-block'; // '다시 시작!' 버튼 표시
            }
        }

        // 페이지 로드 시 게임 초기화
        window.onload = initGame;

        // Enter 키로도 제출 가능하게
        guessInput.addEventListener('keydown', function(event) {
            if (event.key === 'Enter' && !submitGuessButton.disabled) {
                checkGuess();
            }
        });

    </script>
</body>
</html>
